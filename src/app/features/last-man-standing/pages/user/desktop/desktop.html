<div class="main">
  <div class="header">
    <h1>Last Man Standing</h1>
    <h1>
      {{
        gameState && gameState.currentCategory !== undefined
          ? gameState.categories[gameState.currentCategory].category
          : 'Warten - Code: ' + code
      }}
    </h1>
    <h1>Runde {{ round }}</h1>
  </div>

  <div class="wrapper">
    <div class="option-wrapper">
      @if (gameState) {
        <app-cards [isHost]="false" />
      }
    </div>
    <div style="margin-top: auto; margin-bottom: 3em">
      <app-player-list [players]="players ?? []" [round]="round" />
    </div>
  </div>
</div>
